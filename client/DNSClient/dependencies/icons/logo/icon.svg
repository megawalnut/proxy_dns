<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 40 40">

  <g transform="translate(20,20)">

    <!-- outer hex -->
    <polygon points="0,-13 11,-6.5 11,6.5 0,13 -11,6.5 -11,-6.5"
             fill="none"
             stroke="#4da8ff"
             stroke-width="1.6"/>

    <!-- inner hex -->
    <polygon points="0,-8.5 7,-4 7,4 0,8.5 -7,4 -7,-4"
             fill="none"
             stroke="#4da8ff"
             stroke-width="0.7"
             opacity="0.35"/>

    <!-- PROXY (главный текст) -->
    <text x="0" y="4"
          text-anchor="middle"
          font-family="Inter,Segoe UI,sans-serif"
          font-size="5.2"
          font-weight="400"
          fill="#F9F9F9"
          letter-spacing="0.8">PROXY</text>

    <!-- status dot -->
    <circle cx="12" cy="-12" r="1.6" fill="#3dcb8a"/>

  </g>

</svg>
